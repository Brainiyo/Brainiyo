<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainiyo Student Portal | Practice & Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- Firebase v10 Client SDK (modular via CDN compat shim) -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey: 'AIzaSyB40rs2AS30p35OAViEg4DQ45oudpZdgHE',
            authDomain: 'brainiyo-1c200.firebaseapp.com',
            projectId: 'brainiyo-1c200',
            storageBucket: 'brainiyo-1c200.firebasestorage.app',
            messagingSenderId: '337029153114',
            appId: '1:337029153114:web:a0b113f23edb097c317363',
            measurementId: 'G-DPHML0WFBT',
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const auth = getAuth(firebaseApp);
        const googleProvider = new GoogleAuthProvider();

        // Expose to the legacy script below
        window._firebase = { auth, googleProvider, signInWithPopup, onAuthStateChanged };
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #F8FAFC;
        }

        h1,
        h2,
        h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .violet-gradient {
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
        }

        #auth-loading {
            display: none;
        }

        #auth-loading.visible {
            display: flex;
        }
    </style>
</head>

<body class="min-h-screen">

    <!-- Auth Overlay -->
    <div id="auth-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm">
        <div class="p-10 text-center bg-white shadow-2xl rounded-3xl max-w-md w-full mx-4">
            <div
                class="w-16 h-16 rounded-2xl violet-gradient flex items-center justify-center text-white font-extrabold text-2xl mx-auto mb-6">
                B</div>
            <h1 class="text-3xl font-extrabold text-slate-900 mb-2">Welcome to Brainiyo</h1>
            <p class="text-slate-500 mb-8">Sign in to start practising NEET &amp; JEE questions</p>

            <!-- Google Sign-In -->
            <button id="btn-google-login"
                class="w-full py-4 rounded-2xl border-2 border-slate-200 text-slate-800 font-bold text-base hover:border-indigo-400 hover:bg-indigo-50 transition-all flex items-center justify-center gap-3 mb-4">
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#EA4335"
                        d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.5 30.3 0 24 0 14.7 0 6.7 5.4 2.7 13.3l7.9 6.1C12.5 13.1 17.8 9.5 24 9.5z" />
                    <path fill="#4285F4"
                        d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-9.9 7.1-17z" />
                    <path fill="#FBBC05"
                        d="M10.6 28.6A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.1.7-4.6l-7.9-6.1A24 24 0 0 0 0 24c0 3.8.9 7.5 2.7 10.7l7.9-6.1z" />
                    <path fill="#34A853"
                        d="M24 48c6.2 0 11.5-2 15.3-5.5l-7.5-5.8c-2.1 1.4-4.7 2.3-7.8 2.3-6.2 0-11.5-3.7-13.4-9l-7.9 6.1C6.7 42.6 14.7 48 24 48z" />
                </svg>
                Continue with Google
            </button>

            <!-- Demo mode (fallback for testing) -->
            <button id="btn-demo-login"
                class="w-full py-3 rounded-2xl bg-slate-100 text-slate-500 font-medium text-sm hover:bg-slate-200 transition-all">
                Use Demo Account (Testing Only)
            </button>

            <!-- Loading state -->
            <div id="auth-loading" class="items-center justify-center gap-3 mt-6 text-indigo-600 font-medium text-sm">
                <svg class="animate-spin w-5 h-5" viewBox="0 0 24 24" fill="none">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
                </svg>
                Signing you in...
            </div>

            <p id="auth-error" class="mt-4 text-red-500 text-sm hidden"></p>
        </div>
    </div>


    <!-- Main Content (Hidden until login) -->
    <div id="main-content" class="hidden">
        <!-- Top Nav -->
        <nav class="bg-white border-b border-slate-100 py-4 px-6 sticky top-0 z-40">
            <div class="max-w-5xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div
                        class="w-8 h-8 rounded-lg violet-gradient flex items-center justify-center text-white font-bold">
                        B</div>
                    <span class="text-xl font-bold text-slate-800">Brainiyo</span>
                </div>
                <div id="streak-badge"
                    class="flex items-center gap-2 bg-orange-50 text-orange-600 px-4 py-2 rounded-full font-bold text-sm">
                    🔥 <span>0 Day Streak</span>
                </div>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left: Practice Area -->
            <div class="lg:col-span-2 space-y-6">
                <div class="glass p-8 rounded-3xl shadow-sm">
                    <div class="flex justify-between items-center mb-6">
                        <span id="topic-tag"
                            class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-xs font-bold uppercase tracking-wider">Physics
                            • Friction</span>
                        <span id="difficulty-tag" class="text-xs font-bold text-slate-400">MEDIUM</span>
                    </div>

                    <div id="question-body" class="text-xl text-slate-800 font-medium leading-relaxed mb-8">
                        Loading your next challenge...
                    </div>

                    <div id="options-grid" class="space-y-3">
                        <!-- Options injected here -->
                    </div>

                    <div id="feedback-area" class="mt-8 hidden p-6 rounded-2xl bg-slate-50 border border-slate-100">
                        <div id="feedback-title" class="font-bold mb-2"></div>
                        <div id="explanation-body" class="text-sm text-slate-600 leading-relaxed mb-6"></div>
                        <button id="btn-next"
                            class="w-full py-4 bg-slate-900 text-white font-bold rounded-2xl hover:bg-slate-800">
                            Continue Practice
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right: Sidebar -->
            <div class="space-y-6">
                <div class="bg-slate-900 text-white p-8 rounded-3xl shadow-xl">
                    <h3 class="text-lg font-bold mb-4">Daily Goal</h3>
                    <div class="flex justify-between text-sm mb-2">
                        <span id="daily-used">0 / 20 Questions</span>
                        <span id="daily-pct" class="text-indigo-400 font-bold">0%</span>
                    </div>
                    <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                        <div id="daily-bar" class="bg-indigo-500 h-full transition-all duration-500" style="width:0%">
                        </div>
                    </div>
                    <p class="text-xs text-slate-500 mt-3">Free plan: 20 questions/day. <span
                            class="text-indigo-400 cursor-pointer hover:underline">Upgrade Pro →</span></p>
                </div>
            </div>
        </main>
    </div>


    <script>
        // ── Config ──────────────────────────────────────────────────────
        const API_BASE = window.location.hostname === 'localhost'
            ? 'http://localhost:5002/api'
            : '/api'; // works when served from the backend /student route

        let token = null;
        let currentQuestion = null;
        let currentTopicId = 1; // default; will be overridden by topic selector

        // ── Wait for Firebase module to load (it's type="module" above) ─
        function waitForFirebase(cb, attempts = 0) {
            if (window._firebase) return cb();
            if (attempts > 20) return console.error('Firebase SDK not loaded');
            setTimeout(() => waitForFirebase(cb, attempts + 1), 150);
        }

        // ── Event Listeners ─────────────────────────────────────────────
        document.getElementById('btn-google-login').addEventListener('click', loginWithGoogle);
        document.getElementById('btn-demo-login').addEventListener('click', loginDemo);
        document.getElementById('btn-next').addEventListener('click', nextQuestion);

        // ── Google Sign-In ───────────────────────────────────────────────
        async function loginWithGoogle() {
            setAuthLoading(true);
            waitForFirebase(async () => {
                try {
                    const { auth, googleProvider, signInWithPopup } = window._firebase;
                    const result = await signInWithPopup(auth, googleProvider);
                    const idToken = await result.user.getIdToken();
                    await exchangeToken(idToken);
                } catch (err) {
                    showAuthError(err.code === 'auth/popup-closed-by-user'
                        ? 'Sign-in cancelled. Try again.'
                        : `Sign-in failed: ${err.message}`);
                    setAuthLoading(false);
                }
            });
        }

        // ── Demo Login (Testing Only) ────────────────────────────────────
        async function loginDemo() {
            setAuthLoading(true);
            try {
                const res = await fetch(`${API_BASE}/auth/demo-login`, { method: 'POST' });
                const data = await res.json();
                if (!data.token) throw new Error('No token returned');
                token = data.token;
                enterApp(data.user);
            } catch (err) {
                showAuthError('Backend not running. Start the server on port 5000.');
                setAuthLoading(false);
            }
        }

        // ── Exchange Firebase idToken → Brainiyo JWT ─────────────────────
        async function exchangeToken(idToken) {
            const res = await fetch(`${API_BASE}/auth/verify-token`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idToken }),
            });
            const data = await res.json();
            if (!data.success) throw new Error(data.message || 'Token exchange failed');
            token = data.token;
            enterApp(data.user);
        }

        // ── After login: show the app ────────────────────────────────────
        function enterApp(user) {
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            if (user?.name) {
                const greeting = document.createElement('span');
                greeting.className = 'text-sm text-slate-500 hidden sm:block';
                greeting.textContent = `Hi, ${user.name.split(' ')[0]} 👋`;
                document.querySelector('nav .max-w-5xl').appendChild(greeting);
            }
            updateStreak();
            nextQuestion();
        }

        // ── UI helpers ───────────────────────────────────────────────────
        function setAuthLoading(on) {
            document.getElementById('auth-loading').classList.toggle('visible', on);
            document.getElementById('btn-google-login').disabled = on;
            document.getElementById('btn-demo-login').disabled = on;
        }
        function showAuthError(msg) {
            const el = document.getElementById('auth-error');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        // ── Streak ───────────────────────────────────────────────────────
        async function updateStreak() {
            try {
                const res = await fetch(`${API_BASE}/retention/streak`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                document.querySelector('#streak-badge span').innerText =
                    `${data.current_streak || 0} Day Streak`;
            } catch { /* non-critical */ }
        }

        // ── Questions ────────────────────────────────────────────────────
        async function nextQuestion() {
            document.getElementById('feedback-area').classList.add('hidden');
            document.getElementById('options-grid').innerHTML = '';
            document.getElementById('question-body').innerText = 'Loading your next challenge...';

            try {
                const res = await fetch(
                    `${API_BASE}/questions/next?mode=practice&topicId=${currentTopicId}`,
                    { headers: { 'Authorization': `Bearer ${token}` } }
                );
                const data = await res.json();

                // ✅ Fixed: backend returns { question: {...}, meta: {...} }
                const q = data.question;
                if (!q) {
                    document.getElementById('question-body').innerText =
                        data.message || 'No more questions for this topic. Try another!';
                    return;
                }

                currentQuestion = q;
                renderQuestion(q);

                // Update daily goal bar from meta
                if (data.meta) {
                    const pct = Math.round((data.meta.daily_used / data.meta.daily_limit) * 100);
                    document.querySelector('#daily-used').textContent =
                        `${data.meta.daily_used} / ${data.meta.daily_limit} Questions`;
                    document.querySelector('#daily-pct').textContent = `${pct}%`;
                    document.querySelector('#daily-bar').style.width = `${Math.min(pct, 100)}%`;
                }
            } catch (err) {
                console.error('Fetch failed:', err);
                document.getElementById('question-body').innerText =
                    'Error loading question. Is the backend running?';
            }
        }

        function renderQuestion(q) {
            document.getElementById('question-body').innerHTML = q.body;
            document.getElementById('difficulty-tag').innerText = (q.difficulty || 'medium').toUpperCase();

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            ['a', 'b', 'c', 'd'].forEach(opt => {
                if (!q['option_' + opt]) return;
                const btn = document.createElement('button');
                btn.dataset.opt = opt;
                btn.className = 'w-full text-left p-5 rounded-2xl border-2 border-slate-100 hover:border-indigo-500 hover:bg-indigo-50 transition-all font-medium text-slate-700 flex justify-between items-center group';
                btn.innerHTML = `<span>${q['option_' + opt]}</span><span class="text-slate-300 group-hover:text-indigo-500 font-bold uppercase text-xs">${opt.toUpperCase()}</span>`;
                btn.addEventListener('click', () => submitAnswer(opt));
                grid.appendChild(btn);
            });

            if (window.MathJax) MathJax.typesetPromise([document.getElementById('question-body')]);
        }

        async function submitAnswer(opt) {
            // Disable all buttons to prevent double-submit
            document.querySelectorAll('#options-grid button').forEach(b => b.disabled = true);

            const isCorrect = opt.toUpperCase() === (currentQuestion.correct_option || '').toUpperCase();

            // Show Feedback
            const feedback = document.getElementById('feedback-area');
            feedback.classList.remove('hidden');
            const title = document.getElementById('feedback-title');
            title.innerText = isCorrect ? '✨ Correct!' : '❌ Not quite right';
            title.className = isCorrect
                ? 'text-emerald-600 font-bold mb-2'
                : 'text-rose-600 font-bold mb-2';
            document.getElementById('explanation-body').innerHTML =
                currentQuestion.explanation_text || currentQuestion.explanation || 'No explanation available.';

            // Highlight chosen option
            document.querySelectorAll('#options-grid button').forEach(b => {
                if (b.dataset.opt === opt) {
                    b.classList.add(isCorrect ? 'border-emerald-500' : 'border-rose-400');
                }
            });

            // Submit to backend
            try {
                await fetch(`${API_BASE}/questions/attempt`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        questionId: currentQuestion.id,
                        selectedOption: opt.toUpperCase(),
                        timeTakenSeconds: 30,
                    })
                });
                updateStreak();
            } catch { /* non-critical */ }
        }
    </script>
</body>

</html>
